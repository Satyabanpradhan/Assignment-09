<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Dashboard</title>
    <link rel="icon" type="image/x-icon" href="./assets/logo.svg" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="h-full w-screen">
    <section id="dashboard"
        class="relative w-full h-full md:h-[calc(100dvh-4px)] bg-(--text-color) flex flex-col md:flex-row gap-6 p-3">
        <video id="bg-video" autoplay loop muted playsinline
            class="fixed top-0 left-0 w-screen h-screen object-cover z-0"></video>
        <div
            class="sticky md:relative top-4 md:flex-1 flex flex-col justify-between h-full pt-2 pb-4 pl-3 md:pl-4 pr-3 md:pr-0">
            <div class="flex justify-between items-center bg-(--bg-color) md:bg-transparent rounded-[20px] relative">
                <div
                    class="bg-(--bg-color) box-shadow-md px-5 py-3 rounded-[16px] flex items-center gap-3 shadow-none md:shadow-lg">
                    <svg class="text-(--text-color)" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M22 10H2v9a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3zM7 8a1 1 0 0 1-1-1V3a1 1 0 0 1 2 0v4a1 1 0 0 1-1 1m10 0a1 1 0 0 1-1-1V3a1 1 0 0 1 2 0v4a1 1 0 0 1-1 1"
                            opacity=".5" />
                        <path fill="currentColor"
                            d="M19 4h-1v3a1 1 0 0 1-2 0V4H8v3a1 1 0 0 1-2 0V4H5a3 3 0 0 0-3 3v3h20V7a3 3 0 0 0-3-3" />
                    </svg>

                    <span class="text-xl md:text-2xl font-bold leading-tight tracking-tight">Productivity <br
                            class="md:hidden" />Dashboard</span>
                </div>

                <a href="https://github.com/Bismay-exe/COHORT3.0-Assignment09" target="_blank" rel="noopener noreferrer"
                    class="flex justify-center items-center gap-2 bg-(--bg-color) h-14 px-6 py-2 rounded-[16px] box-shadow-md z-99 cursor-pointer">
                    <svg class="text-(--text-color)" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24">
                        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2">
                            <path stroke-dasharray="32"
                                d="M12 4c1.67 0 2.61 0.4 3 0.5c0.53 -0.43 1.94 -1.5 3.5 -1.5c0.34 1 0.29 2.22 0 3c0.75 1 1 2 1 3.5c0 2.19 -0.48 3.58 -1.5 4.5c-1.02 0.92 -2.11 1.37 -3.5 1.5c0.65 0.54 0.5 1.87 0.5 2.5c0 0.73 0 3 0 3M12 4c-1.67 0 -2.61 0.4 -3 0.5c-0.53 -0.43 -1.94 -1.5 -3.5 -1.5c-0.34 1 -0.29 2.22 0 3c-0.75 1 -1 2 -1 3.5c0 2.19 0.48 3.58 1.5 4.5c1.02 0.92 2.11 1.37 3.5 1.5c-0.65 0.54 -0.5 1.87 -0.5 2.5c0 0.73 0 3 0 3">
                                <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="32;0" />
                            </path>
                            <path stroke-dasharray="10" stroke-dashoffset="10"
                                d="M9 19c-1.41 0 -2.84 -0.56 -3.69 -1.19c-0.84 -0.63 -1.09 -1.66 -2.31 -2.31">
                                <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.7s" dur="0.2s"
                                    to="0" />
                            </path>
                        </g>
                    </svg>

                    <span class="hidden md:block text-lg font-bold pr-2">Github</span>
                </a>
            </div>

            <div class="flex flex-wrap justify-between md:items-center gap-12 pt-12 md:pt-0 pb-12 md:pb-0">
                <div class="text-(--bg-color)">
                    <p id="current-date" class="text-3xl font-bold mb-8 tracking-wide text-shadow-sm"></p>
                    <h1 id="current-time"
                        class="text-[clamp(3rem,2.17rem+4.17vw,6.5rem)] leading-[1.05] font-extrabold tracking-tight text-shadow-lg">
                    </h1>
                </div>
                <div class="text-(--bg-color)">
                    <h2 id="weather-temp-cond"
                        class="text-[clamp(1.875rem,1.5rem+1.875vw,3rem)] font-bold leading-[1.2] mb-6 text-shadow-sm">
                        Loading...
                    </h2>
                    <div
                        class="text-[clamp(1.125rem,1.05rem+0.375vw,1.35rem)] font-semibold leading-relaxed opacity-95">
                        <p id="weather-heat" class="text-shadow-sm"></p>
                        <p id="weather-humidity" class="text-shadow-sm"></p>
                        <p id="weather-wind" class="text-shadow-sm"></p>
                    </div>
                </div>
                <div class="hidden md:block"></div>
            </div>

            <div class="w-full flex justify-start md:justify-end">
                <div
                    class="flex items-center gap-4 bg-(--bg-color) box-shadow p-1 pr-6 rounded-[16px] w-max shadow-xl mb-4">
                    <div class="h-12 w-12 bg-zinc-800 rounded-[12px] flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <path fill="#E6431F"
                                d="M12 2c-4.41 0-8 3.59-8 8c-.03 6.44 7.12 11.6 7.42 11.82c.17.12.38.19.58.19s.41-.06.58-.19c.3-.22 7.45-5.37 7.42-11.82c0-4.41-3.59-8-8-8m0 12c-2.21 0-4-1.79-4-4s1.79-4 4-4s4 1.79 4 4s-1.79 4-4 4" />
                        </svg>
                    </div>
                    <span id="location-name" class="text-xl font-bold">Current Location</span>
                </div>
            </div>
        </div>

        <div
            class="md:h-full shrink-0 bg-(--blur-bg-color) backdrop-blur-xl border border-(--border-color) rounded-[36px] shadow-[0_8px_32px_0_rgba(0,0,0,0.15)] grid grid-cols-2 md:grid-cols-1 gap-2 h-full p-3 overflow-y-scroll no-scrollbar">
            <button id="todo-card"
                class="image-zoom h-full md:min-h-[180px] aspect-square rounded-[2vh] p-4 flex flex-col relative overflow-hidden shadow-sm group">
                <div class="flex justify-between items-start z-10">
                    <span class="text-[1.1rem] font-bold text-start">Todo</span>
                    <div class="h-7 px-2 bg-[#df4a2e] rounded-full flex items-center justify-center">
                        <svg class="text-(--bg-color) group-hover:-rotate-45 rotate-0 transition-transform duration-300 ease-in-out"
                            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path fill="none" stroke="currentColor" stroke-width="2"
                                d="M16 5c0 .742.733 1.85 1.475 2.78c.954 1.2 2.094 2.247 3.401 3.046C21.856 11.425 23.044 12 24 12m0 0c-.956 0-2.145.575-3.124 1.174c-1.307.8-2.447 1.847-3.401 3.045C16.733 17.15 16 18.26 16 19m8-7H0" />
                        </svg>
                    </div>
                </div>
            </button>

            <button id="planner-card"
                class="image-zoom h-full md:min-h-[180px] aspect-square rounded-[2vh] p-4 flex flex-col relative overflow-hidden shadow-sm group">
                <div class="flex justify-between items-start z-10">
                    <span class="text-[1.1rem] font-bold leading-tight text-start">Daily<br />Planner</span>
                    <div class="h-7 px-2 bg-[#df4a2e] rounded-full flex items-center justify-center">
                        <svg class="text-(--bg-color) group-hover:-rotate-45 rotate-0 transition-transform duration-300 ease-in-out"
                            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path fill="none" stroke="currentColor" stroke-width="2"
                                d="M16 5c0 .742.733 1.85 1.475 2.78c.954 1.2 2.094 2.247 3.401 3.046C21.856 11.425 23.044 12 24 12m0 0c-.956 0-2.145.575-3.124 1.174c-1.307.8-2.447 1.847-3.401 3.045C16.733 17.15 16 18.26 16 19m8-7H0" />
                        </svg>
                    </div>
                </div>
            </button>

            <button id="goals-card"
                class="image-zoom h-full md:min-h-[180px] aspect-square rounded-[2vh] p-4 flex flex-col relative overflow-hidden shadow-sm group">
                <div class="flex justify-between items-start z-10">
                    <span class="text-[1.1rem] font-bold leading-tight text-start">Daily Goals</span>
                    <div class="h-7 px-2 bg-[#df4a2e] rounded-full flex items-center justify-center">
                        <svg class="text-(--bg-color) group-hover:-rotate-45 rotate-0 transition-transform duration-300 ease-in-out"
                            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path fill="none" stroke="currentColor" stroke-width="2"
                                d="M16 5c0 .742.733 1.85 1.475 2.78c.954 1.2 2.094 2.247 3.401 3.046C21.856 11.425 23.044 12 24 12m0 0c-.956 0-2.145.575-3.124 1.174c-1.307.8-2.447 1.847-3.401 3.045C16.733 17.15 16 18.26 16 19m8-7H0" />
                        </svg>
                    </div>
                </div>
            </button>

            <button id="timer-card"
                class="image-zoom h-full md:min-h-[180px] aspect-square rounded-[2vh] p-4 flex flex-col relative overflow-hidden shadow-sm group">
                <div class="flex justify-between items-start z-10">
                    <span class="text-[1.1rem] font-bold leading-tight text-start">Pomodoro Timer</span>
                    <div class="h-7 px-2 bg-[#df4a2e] rounded-full flex items-center justify-center">
                        <svg class="text-(--bg-color) group-hover:-rotate-45 rotate-0 transition-transform duration-300 ease-in-out"
                            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path fill="none" stroke="currentColor" stroke-width="2"
                                d="M16 5c0 .742.733 1.85 1.475 2.78c.954 1.2 2.094 2.247 3.401 3.046C21.856 11.425 23.044 12 24 12m0 0c-.956 0-2.145.575-3.124 1.174c-1.307.8-2.447 1.847-3.401 3.045C16.733 17.15 16 18.26 16 19m8-7H0" />
                        </svg>
                    </div>
                </div>
            </button>

            <button id="quotes-card"
                class="image-zoom col-span-2 md:col-span-1 3xl:col-span-2 h-full md:min-h-[180px] aspect-square rounded-[2vh] p-4 flex flex-col relative overflow-hidden shadow-sm group">
                <div class="flex justify-between items-start z-10">
                    <span class="text-[1.1rem] font-bold leading-tight text-start">Motivation Quotes</span>
                    <div class="h-7 px-2 bg-[#df4a2e] rounded-full flex items-center justify-center">
                        <svg class="text-(--bg-color) group-hover:-rotate-45 rotate-0 transition-transform duration-300 ease-in-out"
                            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path fill="none" stroke="currentColor" stroke-width="2"
                                d="M16 5c0 .742.733 1.85 1.475 2.78c.954 1.2 2.094 2.247 3.401 3.046C21.856 11.425 23.044 12 24 12m0 0c-.956 0-2.145.575-3.124 1.174c-1.307.8-2.447 1.847-3.401 3.045C16.733 17.15 16 18.26 16 19m8-7H0" />
                        </svg>
                    </div>
                </div>
            </button>
        </div>
    </section>

    <section id="todo-list" class="hidden h-full min-h-screen w-full bg-(--bg-color)">
        <header class="max-w-[2000px] w-full mx-auto p-4 md:p-8">
            <div class="flex justify-between items-center rounded-[20px] relative">
                <div
                    class="bg-(--accent-color) px-5 py-3 rounded-[16px] flex items-center gap-3 text-(--bg-color) text-xl md:text-2xl font-bold leading-tight tracking-tight w-fit">
                    To-Do List
                </div>
                <button id="close-todo"
                    class="bg-(--text-color) h-12 md:h-14 px-4 rounded-[16px] flex gap-0 md:gap-3 items-center group cursor-pointer z-999">
                    <i
                        class="ri-close-line text-xl md:text-2xl text-(--bg-color) group-hover:rotate-180 transition-transform duration-500 ease-in-out"></i>
                    <span class="hidden md:block text-(--bg-color) text-lg font-bold pr-2">Close</span>
                </button>
            </div>
        </header>

        <main class="max-w-[2000px] mx-auto w-full h-full flex flex-col md:flex-row gap-4 pb-24 md:pb-0">
            <div class="md:sticky top-0 pt-4 pb-4 px-4 md:pt-0 md:pb-8 md:px-8 md:max-w-[500px] mx-auto w-full h-full">
                <div
                    class="md:max-w-[500px] mx-auto w-full h-full bg-(--bg-secondary-color) rounded-2xl border border-(--border-color) p-4">
                    <h3 class="text-[1.8rem] font-bold leading-tight text-start pb-6">
                        Add tasks
                    </h3>
                    <form action="" class="flex flex-col gap-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-[1.1rem] font-semibold leading-tight text-start">Task Title</label>
                            <input type="text" id="todo-title"
                                class="w-full h-12 bg-(--bg-color) rounded-lg p-4 border border-(--border-color) font-semibold text-(--text-color)"
                                placeholder="Add a title" />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-[1.1rem] font-semibold leading-tight text-start">Task Description</label>
                            <textarea id="todo-desc"
                                class="w-full h-full min-h-40 bg-(--bg-color) rounded-lg p-4 border border-(--border-color) font-medium text-(--secondary-color)"
                                placeholder="Add description"></textarea>
                        </div>
                        <label class="flex items-center gap-3 text-slate-800 font-medium cursor-pointer">
                            <input type="checkbox" id="todo-important"
                                class="w-5 h-5 rounded-md border border-slate-300 text-indigo-600 focus:ring-2 focus:ring-indigo-500/20 accent-indigo-600 transition-all cursor-pointer" />
                            <span class="text-(--text-color)">Mark as Important</span>
                        </label>

                        <button id="add-todo-btn"
                            class="bg-(--text-color) text-(--bg-color) font-semibold py-2 px-4 rounded-xl h-12 cursor-pointer"
                            type="submit">
                            Add Task
                        </button>
                    </form>
                </div>
            </div>

            <div class="w-full h-full flex flex-col pb-4 md:pb-8">
                <div class="header flex justify-between items-center gap-3 pl-4 md:pl-0 pr-4 md:pr-8 py-2">
                    <h1 class="font-extrabold text-4xl">All Tasks</h1>
                    <button id="clearall-btn" class="text-[#ff6363] hover:text-[#ef4444] hover:sbg-[#ff0000]/20 rounded-lg py-2 px-4 font-bold">
                        <i class="ri-delete-bin-6-line"></i> Clear All
                    </button>
                </div>
                <div class="flex justify-between items-center gap-3 pl-4 md:pl-0 pr-4 md:pr-8 py-2">
                    <div class="counters flex gap-3">
                        <h4 class="text-(--text-muted)">
                            Total:
                            <span id="total-count" class="text-(--text-color) font-bold">0</span>
                        </h4>
                        <h4 class="text-(--text-muted)">
                            Completed:
                            <span id="completed-count" class="text-(--text-color) font-bold">0</span>
                        </h4>
                        <h4 class="text-(--text-muted)">
                            Pending:
                            <span id="pending-count" class="text-(--text-color) font-bold">0</span>
                        </h4>
                    </div>
                </div>
                <div
                    class="w-full flex flex-nowrap overflow-x-scroll no-scrollbar gap-3 pl-4 md:pl-0 pr-4 md:pr-8 py-3">
                    <button id="filter-all"
                        class="bg-(--text-color) text-(--bg-color) hover:text-(--bg-secondary-color) px-4 py-1.5 font-semibold rounded-full transition-all duration-300 ease whitespace-nowrap cursor-pointer">
                        All Task
                    </button>
                    <button id="filter-pending"
                        class="bg-(--bg-secondary-color) hover:bg-(--hover-bg-color) text-(--text-muted) hover:text-(--text-color) px-4 py-1.5 font-semibold rounded-full transition-all duration-300 ease whitespace-nowrap cursor-pointer">
                        Pending Tasks
                    </button>
                    <button id="filter-completed"
                        class="bg-(--bg-secondary-color) hover:bg-(--hover-bg-color) text-(--text-muted) hover:text-(--text-color) px-4 py-1.5 font-semibold rounded-full transition-all duration-300 ease whitespace-nowrap cursor-pointer">
                        Completed Tasks
                    </button>
                    <button id="filter-important"
                        class="bg-(--bg-secondary-color) hover:bg-(--hover-bg-color) text-(--text-muted) hover:text-(--text-color) px-4 py-1.5 font-semibold rounded-full transition-all duration-300 ease whitespace-nowrap cursor-pointer">
                        Important Tasks
                    </button>
                </div>

                <div id="task-cards-container" class="w-full h-full flex flex-col gap-2 pl-4 md:pl-0 pr-4 md:pr-8 pt-2">
                </div>
            </div>
        </main>
    </section>

    <section id="planner-section" class="hidden h-full min-h-screen w-full bg-(--bg-color) pb-24 md:pb-0">
        <header class="max-w-[2000px] w-full mx-auto p-4 md:p-8">
            <div class="flex justify-between items-center rounded-[20px] relative">
                <div
                    class="bg-(--accent-color) px-5 py-3 rounded-[16px] flex items-center gap-3 text-(--bg-color) text-xl md:text-2xl font-bold leading-tight tracking-tight w-fit">
                    Daily Planner
                </div>
                <button id="close-planner"
                    class="bg-(--text-color) h-12 md:h-14 px-4 rounded-[16px] flex gap-0 md:gap-3 items-center group cursor-pointer z-999">
                    <i
                        class="ri-close-line text-xl md:text-2xl text-(--bg-color) group-hover:rotate-180 transition-transform duration-500 ease-in-out"></i>
                    <span class="hidden md:block text-(--bg-color) text-lg font-bold pr-2">Close</span>
                </button>
            </div>
        </header>
        <main class="max-w-[2000px] mx-auto w-full h-full flex flex-col p-4 md:p-8">
            <div id="planner-container" class="flex flex-col gap-4 max-w-3xl mx-auto w-full"></div>
        </main>
    </section>

    <section id="goals-section" class="hidden h-full min-h-screen w-full bg-(--bg-color) pb-24 md:pb-0">
        <header class="max-w-[2000px] w-full mx-auto p-4 md:p-8">
            <div class="flex justify-between items-center rounded-[20px] relative">
                <div
                    class="bg-(--accent-color) px-5 py-3 rounded-[16px] flex items-center gap-3 text-(--bg-color) text-xl md:text-2xl font-bold leading-tight tracking-tight w-fit">
                    Daily Goals
                </div>
                <button id="close-goals"
                    class="bg-(--text-color) h-12 md:h-14 px-4 rounded-[16px] flex gap-0 md:gap-3 items-center group cursor-pointer z-999">
                    <i
                        class="ri-close-line text-xl md:text-2xl text-(--bg-color) group-hover:rotate-180 transition-transform duration-500 ease-in-out"></i>
                    <span class="hidden md:block text-(--bg-color) text-lg font-bold pr-2">Close</span>
                </button>
            </div>
        </header>
        <main class="max-w-[2000px] mx-auto w-full h-full flex flex-col md:flex-row gap-8 p-4 md:p-8">
            <div class="w-full md:w-1/3 bg-(--bg-secondary-color) rounded-2xl border border-(--border-color) p-6 h-max">
                <h3 class="text-[1.8rem] font-bold leading-tight text-start pb-6">
                    Add Goal
                </h3>
                <input type="text" id="goal-input"
                    class="w-full h-12 bg-(--bg-color) rounded-lg p-4 border border-(--border-color) font-semibold text-(--text-color) mb-4"
                    placeholder="New Goal" />
                <button id="add-goal-btn"
                    class="w-full bg-(--text-color) text-(--bg-color) font-semibold py-2 px-4 rounded-xl h-12 cursor-pointer">
                    Add Goal
                </button>
            </div>
            <div class="w-full md:w-2/3">
                <h2 class="text-2xl font-bold mb-4">
                    Progress: <span id="goal-progress">0/0</span>
                </h2>
                <div id="goals-container" class="flex flex-col gap-2"></div>
            </div>
        </main>
    </section>

    <section id="timer-section" class="hidden h-full min-h-screen w-full bg-(--bg-color)">
        <header class="max-w-[2000px] w-full mx-auto p-4 md:p-8">
            <div class="flex justify-between items-center rounded-[20px] relative">
                <div
                    class="bg-(--accent-color) px-5 py-3 rounded-[16px] flex items-center gap-3 text-(--bg-color) text-xl md:text-2xl font-bold leading-tight tracking-tight w-fit">
                    Pomodoro Timer
                </div>
                <button id="close-timer"
                    class="bg-(--text-color) h-12 md:h-14 px-4 rounded-[16px] flex gap-0 md:gap-3 items-center group cursor-pointer z-999">
                    <i
                        class="ri-close-line text-xl md:text-2xl text-(--bg-color) group-hover:rotate-180 transition-transform duration-500 ease-in-out"></i>
                    <span class="hidden md:block text-(--bg-color) text-lg font-bold pr-2">Close</span>
                </button>
            </div>
        </header>
        <main class="max-w-[2000px] mx-auto w-full h-full flex flex-col items-center justify-center p-4 md:p-8">
            <h2 id="timer-label" class="text-3xl font-bold mb-4">Work Session</h2>
            <div class="text-[8rem] font-bold mb-8" id="timer-display">25:00</div>
            <div class="flex gap-4">
                <button id="timer-start"
                    class="bg-green-500 text-white font-semibold py-3 px-8 rounded-xl text-xl cursor-pointer">
                    Start
                </button>
                <button id="timer-pause"
                    class="bg-yellow-500 text-white font-semibold py-3 px-8 rounded-xl text-xl cursor-pointer">
                    Pause
                </button>
                <button id="timer-reset"
                    class="bg-red-500 text-white font-semibold py-3 px-8 rounded-xl text-xl cursor-pointer">
                    Reset
                </button>
            </div>
        </main>
    </section>

    <section id="quotes-section" class="hidden h-full min-h-screen w-full bg-(--bg-color)">
        <header class="max-w-[2000px] w-full mx-auto p-4 md:p-8">
            <div class="flex justify-between items-center rounded-[20px] relative">
                <div
                    class="bg-(--accent-color) px-5 py-3 rounded-[16px] flex items-center gap-3 text-(--bg-color) text-xl md:text-2xl font-bold leading-tight tracking-tight w-fit">
                    Motivation Quotes
                </div>
                <button id="close-quotes"
                    class="bg-(--text-color) h-12 md:h-14 px-4 rounded-[16px] flex gap-0 md:gap-3 items-center group cursor-pointer z-999">
                    <i
                        class="ri-close-line text-xl md:text-2xl text-(--bg-color) group-hover:rotate-180 transition-transform duration-500 ease-in-out"></i>
                    <span class="hidden md:block text-(--bg-color) text-lg font-bold pr-2">Close</span>
                </button>
            </div>
        </header>
        <main class="max-w-[2000px] mx-auto w-full h-full flex flex-col items-center justify-center p-4 md:p-8">
            <div
                class="max-w-3xl text-center bg-(--bg-secondary-color) p-12 rounded-3xl border border-(--border-color)">
                <p id="quote-text" class="text-4xl font-bold mb-6 italic">
                    "Loading quote..."
                </p>
                <p id="quote-author" class="text-2xl text-(--text-muted) mb-8"></p>
                <button id="new-quote-btn"
                    class="bg-(--text-color) text-(--bg-color) font-semibold py-3 px-8 rounded-xl text-xl mt-4 cursor-pointer">
                    New Quote
                </button>
            </div>
        </main>
    </section>

    <button id="theme-toggle"
        class="fixed right-5 md:right-auto md:left-10 bottom-10 bg-(--accent-color) h-14 w-14 hover:w-fit px-4 py-2 rounded-[16px] flex justify-center items-center gap-3 shadow-none md:shadow-lg group transition-width duration-300 ease z-99999 cursor-pointer">
    </button>

    <script src="script.js"></script>
</body>

</html>
